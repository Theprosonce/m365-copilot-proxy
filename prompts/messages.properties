# Tool-calling prompt fragments — Java message-bundle (messages.properties) style.
#
# Override the catalog with prompt_catalog_path in config.ini.
# Values support {name} / {begin} / {end} placeholders and \n \t \\ escapes.
#

tools.required=You MUST output a function-call block now.

tools.forced=You MUST call the function `{name}` now using the block format.

tools.correction=\n\n# REQUIRED\nRespond now with ONLY a valid tool-call block between {begin} and {end}, with `arguments` as a JSON object and a function name from the list above (use write/edit to create or change files). Make your best-guess call — do not answer in prose, do not ask the user, do not explain. Output nothing but the block.
